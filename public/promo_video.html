<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>MAMAOSO Promo Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: 'Outfit', sans-serif; color: white; width: 100vw; height: 100vh; }
        
        .scene { position: absolute; inset: 0; opacity: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Scene Container for fixed scaling */
        .scene-content { position: relative; width: 1920px; height: 1080px; transform-origin: center center; display: flex; align-items: center; justify-content: center; }
        @keyframes fadeInOutScene {
            0% { opacity: 0; }
            5% { opacity: 1; }
            30% { opacity: 1; }
            33% { opacity: 0; }
            100% { opacity: 0; }
        }
        @keyframes slideUpFade {
            0% { transform: translateY(150px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; filter: drop-shadow(0 0 40px rgba(16,185,129,0.6)); }
        }
        @keyframes textSlam {
            0% { transform: scale(3); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 100px -20px #10b981; }
            50% { box-shadow: 0 0 150px 20px #10b981; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
        
        /* Scene timings */
        #scene1 { animation: fadeInOutScene 15s linear infinite; }
        #scene2 { animation: fadeInOutScene 15s linear infinite; animation-delay: 4.95s; }
        #scene3 { animation: fadeInOutScene 15s linear infinite; animation-delay: 9.9s; }

        /* Scene 1 elements */
        #scene1 .jar { animation: slideUpFade 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        #scene1 .jar-float { animation: float 6s ease-in-out infinite; }
        #scene1 .text1 { animation: textSlam 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s; opacity: 0; }
        #scene1 .text2 { animation: textSlam 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s; opacity: 0; color: #10b981; }

        /* Scene 2 & 3 elements */
        @keyframes zoomPan {
            0% { transform: scale(1.1); }
            100% { transform: scale(1.3) translateX(-50px); }
        }
        .bg-pan { animation: zoomPan 6s linear forwards; }
        @keyframes slideInLeft {
            0% { transform: translateX(-200px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .text-slide { animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
    </style>
</head>
<body>

    <!-- Scene 1: The Intro (0-5s) -->
    <div id="scene1" class="scene">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-primary/20 rounded-full blur-[200px] bg-[#10b981] opacity-30"></div>
        <div class="z-10 flex flex-col items-center jar-float">
            <h2 class="text-7xl font-black mb-10 tracking-widest text1 uppercase text-white drop-shadow-2xl">EL ALIVIO TIENE NOMBRE</h2>
            <img src="./hero_studio_jar_1775966524951.png" class="h-[600px] object-contain jar" />
            <h1 class="text-[140px] font-black mt-4 leading-none text2 drop-shadow-2xl">MAMAOSO</h1>
            <p class="text-4xl text-emerald-200 mt-6 tracking-[0.2em] uppercase font-bold" style="animation: textSlam 1s forwards 2s; opacity: 0;">Fórmula Premium</p>
        </div>
    </div>

    <!-- Scene 2: Application / Ingredients (5-10s) -->
    <div id="scene2" class="scene">
        <img src="./ingredients_botanical_1775966600111.png" class="absolute inset-0 w-full h-full object-cover bg-pan opacity-60" />
        <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/60 to-transparent"></div>
        <div class="absolute left-32 top-1/2 -translate-y-1/2 z-10">
            <h2 class="text-emerald-400 text-6xl font-black uppercase tracking-widest mb-6 text-slide" style="animation-delay: 5.2s;">Poder Botánico</h2>
            <h1 class="text-white text-9xl font-black leading-tight text-slide" style="animation-delay: 5.5s;">Sinergia<br>Natural</h1>
            <div class="flex gap-6 mt-12 text-slide" style="animation-delay: 5.8s;">
                <div class="bg-white/10 backdrop-blur-md px-10 py-6 rounded-3xl border border-white/20">
                    <p class="text-4xl font-bold uppercase tracking-wider text-white">Árnica</p>
                </div>
                <div class="bg-white/10 backdrop-blur-md px-10 py-6 rounded-3xl border border-white/20">
                    <p class="text-4xl font-bold uppercase tracking-wider text-emerald-300">Uña de Gato</p>
                </div>
            </div>
            <p class="text-4xl text-gray-300 mt-12 max-w-3xl leading-relaxed text-slide" style="animation-delay: 6s;">Ingredientes curativos diseñados para absorberse rápidamente y actuar donde más lo necesitas.</p>
        </div>
    </div>

    <!-- Scene 3: Order Now (10-15s) -->
    <div id="scene3" class="scene">
        <img src="./triple_jar_bundle_1775966570362.png" class="absolute right-0 top-1/2 -translate-y-1/2 h-[900px] object-contain opacity-80" style="animation: textSlam 2s forwards 10s; opacity: 0;" />
        <div class="absolute inset-0 bg-gradient-to-l from-transparent via-slate-900/80 to-slate-900"></div>
        <div class="absolute left-32 top-1/2 -translate-y-1/2 z-10">
            <h1 class="text-white text-[120px] font-black leading-none uppercase mb-6 text-slide" style="animation-delay: 10.2s;">Recupera Tu<br><span class="text-emerald-400">Bienestar</span></h1>
            <p class="text-4xl text-gray-300 mb-16 text-slide" style="animation-delay: 10.5s;">Pide Hoy. Paga en Casa.</p>
            
            <div class="inline-block bg-emerald-500 text-white text-5xl font-black px-16 py-8 rounded-[3rem] uppercase tracking-wider text-slide shadow-[0_0_80px_#10b981]" style="animation-delay: 10.8s;">
                ORDENAR AHORA
            </div>
            <div class="flex gap-4 mt-12 text-2xl font-bold text-gray-400 uppercase tracking-widest text-slide" style="animation-delay: 11s;">
                <span>🚚 Envío Gratis</span> <span class="mx-4 text-emerald-500">|</span> <span>🤝 Pago Contraentrega</span>
            </div>
        </div>
    </div>

    <script>
        // Responsive Scaling Logic
        function scaleContent() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const targetWidth = 1920;
            const targetHeight = 1080;
            
            const scaleX = width / targetWidth;
            const scaleY = height / targetHeight;
            const scale = Math.max(scaleX, scaleY); // Cover approach
            
            document.querySelectorAll('.scene').forEach(scene => {
                scene.style.transform = `scale(${scale})`;
                scene.style.transformOrigin = 'center center';
                scene.style.width = '1920px';
                scene.style.height = '1080px';
                scene.style.left = '50%';
                scene.style.top = '50%';
                scene.style.marginLeft = '-960px';
                scene.style.marginTop = '-540px';
            });
        }
        
        window.addEventListener('resize', scaleContent);
        scaleContent();

        // Self-restarting animation loop
        setTimeout(() => {
            document.querySelectorAll('.scene').forEach(el => {
                el.style.animation = 'none';
                void el.offsetWidth; // trigger reflow
                el.style.animation = null; 
            });
        }, 15000);
    </script>
</body>
</html>
